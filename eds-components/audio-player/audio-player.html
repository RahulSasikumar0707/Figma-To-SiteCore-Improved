<a href="#" class="play" aria-label="play audio"></a>
<a href="#" class="pause" aria-label="pause audio"></a>
<div class="time-keep">
<span class="current-time">00:00</span> / <span class="duration">00:00</span>
</div>
<div class="progress-bar">
<div class="progress-bar-progressed"></div>
</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
</main>

</div>
